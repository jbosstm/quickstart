# LRA AI Dashboard — application configuration

# HTTP port (coordinator uses 8080 by default)
quarkus.http.port=8082

# LRA Coordinator base URL (without trailing slash)
lra.coordinator.url=http://localhost:8080/lra-coordinator

# ── Ollama backend (local / air-gapped mode) ─────────────────────────────────
# Requires Ollama running locally: https://ollama.com
# Pull a tool-calling capable model first:
#   ollama pull llama3.1
quarkus.langchain4j.ollama.chat-model.model-id=llama3.1
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.timeout=120s
quarkus.langchain4j.ollama.log-requests=true
quarkus.langchain4j.ollama.log-responses=true

# ── OpenAI backend (cloud mode) ──────────────────────────────────────────────
# To use OpenAI instead of Ollama:
#   1. Swap the dependency in pom.xml (comment out ollama, uncomment openai)
#   2. Comment out the Ollama properties above
#   3. Uncomment the properties below and export LRA_AI_API_KEY=sk-...
#
# quarkus.langchain4j.openai.api-key=${LRA_AI_API_KEY:demo}
# quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
# quarkus.langchain4j.openai.chat-model.temperature=0.3
# quarkus.langchain4j.openai.timeout=60s
# quarkus.langchain4j.openai.log-requests=true
# quarkus.langchain4j.openai.log-responses=true

# ── Anthropic Claude backend (cloud mode) ────────────────────────────────────
# To use Claude instead of Ollama:
#   1. Add the dependency in pom.xml:
#        <dependency>
#            <groupId>io.quarkiverse.langchain4j</groupId>
#            <artifactId>quarkus-langchain4j-anthropic</artifactId>
#        </dependency>
#      and remove (or comment out) quarkus-langchain4j-ollama.
#   2. Comment out the Ollama properties above.
#   3. Uncomment the properties below and export ANTHROPIC_API_KEY=sk-ant-...
#      (obtain your key at https://console.anthropic.com)
#
# quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
# quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-6
# quarkus.langchain4j.anthropic.chat-model.temperature=0.3
# quarkus.langchain4j.anthropic.timeout=60s
# quarkus.langchain4j.anthropic.log-requests=true
# quarkus.langchain4j.anthropic.log-responses=true
